<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELMORAAA Clothes</title>

    <!-- SEO -->
    <meta name="description" content="VELMORAAA - Trendy and Stylish Clothing Brand">
    <meta name="keywords" content="VELMORAAA, clothes, fashion, trendy outfits">
    <meta name="author" content="VELMORAAA">

    <!-- Styling -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }

        header {
            background-color: black;
            color: white;
            padding: 20px;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .container {
            padding: 50px;
        }

        .product {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 250px;
            border-radius: 10px;
        }

        .price {
            font-size: 20px;
            margin: 10px 0;
            color: green;
        }

        .buy-btn {
            padding: 12px 25px;
            font-size: 16px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .buy-btn:hover {
            background-color: #444;
        }
    </style>
</head>

<body>

<header>
    VELMORAAA
</header>

<div class="container">
    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Clothes">
        <h2>Stylish T-Shirt</h2>
        <p class="price">₹799</p>

        <!-- Buy Now Button -->
        <button class="buy-btn" onclick="buyNow()">Buy Now</button>
    </div>
</div>

<script>
    function buyNow() {
        // redirect to thank you page
        window.location.href = "thankyou.html";
    }
</script>

</body>
</html>
